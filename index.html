<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎀 Adivinanzas  Goth 🎀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
--black:#0f0a1f;
--deeppurple:#2a1b4a;
--purple:#8b3eff;
--hotpurple:#c84cff;
--lav:#d8b4ff;
--neonpink:#ff4dff;
--bg:#1a1429;
--ink:#e0d4ff;
--white:#f8f0ff;
--shadow:0 10px 30px rgba(139,62,255,.35);
}

*{box-sizing:border-box}

html,body{
height:100%;
margin:0;
font-family:'Nunito', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
color:var(--ink);
background: var(--bg);
overflow:hidden;
}

/* Fondo dinámico oscuro */
body::before{
content:"";
position:fixed;
inset:0;
background-size:cover;
background-position:center;
filter:brightness(0.75) saturate(1.2) blur(3px);
transform:scale(1.03);
z-index:-2;
}

body::after{
content:"";
position:fixed;
inset:0;
background:linear-gradient(180deg, rgba(26,20,41,.85), rgba(15,10,31,.9));
z-index:-1;
}

.app{
display:grid;
place-items:center;
height:100%;
padding:24px;
}
.card{
width:min(760px, 92vw);
background:var(--deeppurple);
border-radius:28px;
box-shadow:var(--shadow);
padding:32px;
border:5px solid var(--purple);
position:relative;
overflow:hidden;
}
.ribbon{
position:absolute;
top:-16px; left:28px;
background:linear-gradient(90deg, var(--hotpurple), var(--lav));
color:var(--white);
padding:10px 18px;
border-radius:14px;
font-weight:900;
letter-spacing:1px;
box-shadow:0 8px 20px rgba(200,76,255,.4);
}

.title{
display:flex; align-items:center; gap:12px;
font-size:32px; font-weight:900;
color:var(--neonpink);
margin:20px 0 14px;
text-shadow:0 0 12px rgba(255,77,255,.6);
}
.title .emoji{font-size:32px}

.subtitle{ font-size:17px; color:#b8a0ff; margin:0 0 20px; }

.status-bar{
display:flex; gap:12px; flex-wrap:wrap; margin:12px 0 20px;
}
.pill{
background:rgba(139,62,255,.15);
border:2px solid var(--lav);
border-radius:999px;
padding:9px 14px;
font-weight:700; color:var(--lav);
}

.question{
background:rgba(42,27,74,.6);
border:2px dashed var(--hotpurple);
border-radius:18px;
padding:20px;
margin:12px 0 20px;
font-size:19px;
color:var(--white);
}

.input-row{ display:flex; gap:12px; flex-wrap:wrap; margin:10px 0 12px; }
input[type="text"]{
flex:1;
min-width:240px;
padding:14px 16px;
background:var(--black);
border:2px solid var(--lav);
border-radius:16px;
font-size:17px;
color:var(--ink);
outline:none;
transition:border-color .2s, box-shadow .2s;
}
input[type="text"]:focus{
border-color:var(--neonpink);
box-shadow:0 0 0 6px rgba(255,77,255,.2);
}

.btn{
padding:14px 20px;
border:none;
border-radius:16px;
font-weight:900;
cursor:pointer;
transition:transform .1s ease, box-shadow .2s ease;
}
.btn-primary{
background:linear-gradient(90deg, var(--hotpurple), var(--purple));
color:var(--white);
box-shadow:0 10px 20px rgba(200,76,255,.45);
}
.btn-ghost{
background:rgba(216,180,255,.1); 
color:var(--lav); 
border:2px solid var(--lav);
}
.btn:active{ transform:scale(0.96); }

.feedback{ min-height:32px; margin:8px 0 10px; font-weight:800; font-size:17px; }
.correct{ color:#7fffd4; text-shadow:0 0 8px #7fffd4; }
.wrong{ color:#ff6bc4; text-shadow:0 0 8px #ff6bc4; }

.hint{ font-size:15px; color:#b8a0ff; }

.progress{ height:12px; background:#2a1b4a; border-radius:999px; overflow:hidden; margin:10px 0 6px; }
.bar{ height:100%; width:0%; background:linear-gradient(90deg, #c84cff, #8b3eff); transition:width .4s ease; }

.sparkles{ position:absolute; inset:-10px; pointer-events:none; }
.sparkle{
position:absolute;
width:16px;height:16px;border-radius:6px;
background:radial-gradient(circle, #fff 10%, #d8b4ff 50%, transparent 80%);
animation: twinkle 2.2s infinite ease-in-out;
filter: drop-shadow(0 0 8px #c84cff);
}

@keyframes twinkle {
0%{ transform:scale(0.6) rotate(0deg); opacity:0.6; }
50%{ transform:scale(1.25) rotate(50deg); opacity:1; }
100%{ transform:scale(0.6) rotate(0deg); opacity:0.6; }
}

@media (max-width:520px){
.title{ font-size:26px }
.card{ padding:24px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="ribbon">✨ Modo Kawaii Goth ✨</div>
    
    <div class="title">
      <span class="emoji">🖤</span> Adivinanzas<span class="emoji">🎀</span>
    </div>
    <p class="subtitle">🧠 Responde la adivinanza. Tienes 3 intentos. ¡Pistas misteriosas incluidas! 🕯️</p>

    <div class="status-bar">
      <div class="pill">⏳ Tiempo: <span id="timer">00:30</span></div>
      <div class="pill">💖 Intentos: <span id="tries">3</span></div>
      <div class="pill">⭐ Puntaje: <span id="score">0</span></div>
    </div>

    <div id="question" class="question">
      Soy pequeño y redondo, rojo brillante. Tengo semillas por fuera. ¿Quién soy? 🍓
    </div>

    <div class="input-row">
      <input type="text" id="answer" placeholder="Escribe tu respuesta aquí...">
    </div>

    <div id="feedback" class="feedback"></div>
    <div id="hint" class="hint"></div>

    <div class="progress"><div id="bar" class="bar"></div></div>

    <button class="btn btn-primary" id="submit">✨ Responder</button>
    <button class="btn btn-ghost" id="hintBtn">💡 Pista</button>

    <p style="margin:20px 0 10px; text-align:center; color:#b8a0ff;">
      🌸 Nivel: <span id="level">1</span> / <span id="total">3</span>
    </p>

    <button class="btn btn-ghost" id="next">➡️ Siguiente</button>
    <button class="btn btn-ghost" id="reset">🔄 Reiniciar</button>

    <div class="sparkles"></div>
  </div>
</div>

<script>
// === Adivinanzas (igual que antes) ===
const riddles = [
{
q: "Soy pequeño y redondo, rojo brillante. Tengo semillas por fuera. ¿Quién soy? 🍓",
a: ["fresa","frutilla","strawberry"],
hints: ["Soy una fruta.", "Mis semillas están por fuera.", "Soy muy usada en postres kawaii."]
},
{
q: "No tengo boca, pero puedo hablar. No tengo oídos, pero puedo escuchar. ¿Qué soy? 🔊",
a: ["eco"],
hints: ["Vivo en montañas y habitaciones vacías.", "Repito lo que dices.", "Sueno igual que tu voz."]
},
{
q: "Vuelo sin alas, lloro sin ojos. Siempre que voy, el mundo sonríe. ¿Qué soy? 🌬️",
a: ["nube","nubes","viento","brisa"],
hints: ["Estoy en el cielo.", "A veces soy suave, a veces tormentosa.", "Me muevo y cambio de forma."]
}
];

// === Estado del juego ===
let level = 0;
let score = 0;
let tries = 3;
let timeLeft = 30;
let timerId = null;
let hintIndex = 0;

// === Elementos DOM ===
const elQuestion = document.getElementById('question');
const elAnswer = document.getElementById('answer');
const elSubmit = document.getElementById('submit');
const elHintBtn = document.getElementById('hintBtn');
const elFeedback = document.getElementById('feedback');
const elHint = document.getElementById('hint');
const elTimer = document.getElementById('timer');
const elTries = document.getElementById('tries');
const elScore = document.getElementById('score');
const elLevel = document.getElementById('level');
const elTotal = document.getElementById('total');
const elBar = document.getElementById('bar');
const elNext = document.getElementById('next');
const elReset = document.getElementById('reset');
const sparklesContainer = document.querySelector('.sparkles');

elTotal.textContent = riddles.length;

// Crear sparkles morados
for(let i = 0; i < 28; i++){
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.style.left = (Math.random()*100)+'%';
  s.style.top = (Math.random()*100)+'%';
  s.style.animationDelay = (Math.random()*2.5)+'s';
  sparklesContainer.appendChild(s);
}

// Fondo waifu (sigue funcionando)
async function loadWaifuBackground(){
  try{
    const res = await fetch("https://api.waifu.pics/sfw/waifu");
    const data = await res.json();
    const style = document.createElement("style");
    style.innerHTML = `body::before { background-image:url("${data.url}"); }`;
    document.head.appendChild(style);
  }catch(e){ console.error("Error waifu:", e); }
}

// Timer
function startTimer(){
  clearInterval(timerId);
  timeLeft = 30;
  updateTimer();
  timerId = setInterval(()=>{
    timeLeft--;
    updateTimer();
    const pct = Math.max(0, (timeLeft/30)*100);
    elBar.style.width = pct+'%';
    if(timeLeft <= 0){
      clearInterval(timerId);
      lockInput();
      feedbackWrong("⏰ Tiempo agotado. La respuesta era: " + riddle().a[0].toUpperCase());
    }
  }, 1000);
}

function updateTimer(){
  const ss = String(timeLeft).padStart(2,'0');
  elTimer.textContent = `00:${ss}`;
}

function riddle(){ return riddles[level]; }

function loadLevel(){
  elQuestion.textContent = riddle().q;
  elLevel.textContent = (level+1);
  elFeedback.textContent = '';
  elHint.textContent = '';
  hintIndex = 0;
  tries = 3;
  elTries.textContent = tries;
  elBar.style.width = '100%';
  unlockInput();
  elAnswer.value = '';
  elAnswer.focus();
  startTimer();
}

function normalize(str){
  return (str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}

function check(){
  const val = normalize(elAnswer.value);
  if(!val) return;

  const ok = riddle().a.map(normalize).includes(val);

  if(ok){
    score += Math.max(15, timeLeft * 2); // un poco más de puntos en modo goth
    elScore.textContent = score;
    feedbackCorrect("🥀 ¡Correcto, mi oscura estrella! ✨");
    clearInterval(timerId);
    lockInput();
  } else {
    tries--;
    elTries.textContent = tries;
    if(tries <= 0){
      clearInterval(timerId);
      feedbackWrong("💔 Sin intentos... La respuesta era: " + riddle().a[0].toUpperCase());
      lockInput();
    } else {
      feedbackWrong("🙈 No es esa... ¡Inténtalo otra vez, pequeño cuervo!");
    }
  }
}

function feedbackCorrect(msg){
  elFeedback.textContent = msg;
  elFeedback.className = 'feedback correct';
}
function feedbackWrong(msg){
  elFeedback.textContent = msg;
  elFeedback.className = 'feedback wrong';
}

function showHint(){
  const hints = riddle().hints;
  if(hintIndex < hints.length){
    elHint.textContent = "💜 Pista oscura: " + hints[hintIndex];
    hintIndex++;
  } else {
    elHint.textContent = "🌑 No hay más pistas... Confía en tu intuición gótica.";
  }
}

function lockInput(){
  elAnswer.disabled = true;
  elSubmit.disabled = true;
  elHintBtn.disabled = true;
}
function unlockInput(){
  elAnswer.disabled = false;
  elSubmit.disabled = false;
  elHintBtn.disabled = false;
}

function nextLevel(){
  if(level < riddles.length-1){
    level++;
    loadLevel();
  } else {
    elQuestion.innerHTML = `🎉 <strong>¡Completaste todas las adivinanzas!</strong><br>Puntaje final: <strong>${score}</strong> 🌟`;
    elFeedback.textContent = "Gracias por jugar, alma kawaii goth 🖤";
    lockInput();
    clearInterval(timerId);
    elBar.style.width = '0%';
  }
}

function resetGame(){
  level = 0; score = 0;
  elScore.textContent = score;
  loadLevel();
}

// Eventos
elSubmit.addEventListener('click', check);
elAnswer.addEventListener('keydown', (e) => { if(e.key === 'Enter') check(); });
elHintBtn.addEventListener('click', showHint);
elNext.addEventListener('click', nextLevel);
elReset.addEventListener('click', resetGame);

// Iniciar
loadWaifuBackground();
loadLevel();
</script>
</body>
</html>
